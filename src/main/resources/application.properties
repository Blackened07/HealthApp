# Application Configuration
spring.application.name=HealthApp
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/health_app_db
spring.datasource.username=postgres
spring.datasource.password=metallicajames83
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.ru.HealthApp=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.ServletInvocableHandlerMethod=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.apache.coyote=WARN
logging.level.org.springframework.web.filter=TRACE
